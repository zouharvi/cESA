<!doctype html><html lang="en" style="height: 100%;"><head><meta charset="UTF-8"><meta name="viewport" content="width=810px"><title>Pearmut Evaluation</title><link rel="icon" type="image/svg+xml" href="favicon.svg"><style>:root {
      --box-width: 325px;
    }

    .output_item {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .output_scrollable {
      overflow-x: auto;
      gap: 5px 10px;
      min-width: 0;
      padding-right: 10px;
      padding-bottom: 25px;
      padding-left: 5px;
      display: flex;
      flex: 1;
    }

    .output_src,
    .output_tgt,
    .output_ref {
      word-break: break-word;
      min-width: var(--box-width);
    }

    .output_src,
    .output_ref {
      display: inline-block;
      box-sizing: border-box;
      background-color: #fff7;
      padding: 10px;
      border-radius: 8px;
      vertical-align: top;
      box-shadow: 0 4px 6px #0005;
      box-sizing: border-box;
      flex: 1;
      height: 100%;
    }

    .output_candidate {
      display: inline-block;
      box-sizing: border-box;
      vertical-align: top;
      flex: 1;
    }

    .output_tgt,
    .output_textfield {
      width: calc(100% - 20px);
      background-color: #fffc;
      padding: 10px;
      border-radius: 8px;
      user-select: none;
      box-shadow: 0 4px 6px #0005;
      border: none;
    }

    .output_response {
      display: flex;
      align-items: center;
      margin-top: 5px;
      position: relative;
      border-radius: 5px;
    }

    /* When output_response contains slider_container children, stack vertically */
    .output_response:has(.slider_container) {
      flex-direction: column;
      align-items: stretch;
    }

    .output_response input[type=range] {
      flex: 1;
      min-width: 0;
    }

    .slider_label {
      width: 65px;
      font-size: 10pt;
      color: #555;
      text-align: right;
      margin-left: 0px;
      height: 1em;
    }

    .slider_label_cESA {
      width: 100%;
    }


    /* Custom sliders styling */
    .slider_container {
      display: flex;
      align-items: center;
      position: relative;
    }

    .slider_container:first-child {
      margin-top: 0;
    }


    .slider_name {
      display: inline-block;
      width: 120px;
      margin-right: 8px;
      color: #333;
      flex-shrink: 0;
    }

    input[type=range] {
      height: 16px;
      position: relative;
      width: 100%;
      min-width: 0;
    }

    /* Slider anchors at 33% and 66% */
    .slider_anchor_parent {
      width: 100%;
      margin-top: -1.3em;
      height: 1.4em;
    }

    .slider_anchor_simple {
      width: 1px;
      pointer-events: none;
      z-index: 1;
      color: #777;
      font-size: 9pt;
      margin-left: 33%;
    }

    .output_response::before {
      left: calc(33% - 18px);
    }

    .output_response::after {
      left: calc(66% - 36px);
    }

    /* Textfield styling */
    .output_textfield {
      width: calc(100% - 20px);
      margin-top: 10px;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid #999;
      resize: vertical;
      min-height: 60px;
      font-family: inherit;
      font-size: 10pt;
    }

    .textfield_toggle {
      background: none;
      border: none;
      font-size: 9pt;
      cursor: pointer;
    }

    /* styling of HTML tags in outputs */
    :is(.output_tgt, .output_src)> :is(h1, h2, h3) {
      margin: 0;
    }
    #output_div img:not(.zoomed-img) {
      cursor: zoom-in;
    }
    .zoomed-img {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 9999;
      object-fit: contain;
      background: rgba(0,0,0,0.8);
      padding: 20px;
      box-sizing: border-box;
      cursor: zoom-out;
      margin: 0;
    }</style><script defer="defer" src="index.bundle.js?e3c16ecf32a9e80a0bb4"></script><link href="style.css?e3c16ecf32a9e80a0bb4" rel="stylesheet"></head><body style="min-height: 100vh; display: flex; flex-direction: column; margin: 0;"><div style="flex: 1;"><div style="max-width: 1800px; min-width: 800px; margin-left: auto; margin-right: auto; margin-top: 20px; padding-left: 10px;"><div class="white-box" style="margin-right: 10px; background-color: #e7e2cf; padding: 5px 15px 5px 5px;"><span id="instructions_global" style="display: inline-block; font-size: 11pt; width: calc(100% - 175px);"></span><div id="progress_div" style="width: 170px; display: inline-block; vertical-align: top; text-align: right; padding-top: 5px;"><span id="time" style="width: 135px; text-align: left; display: inline-block; font-size: 11pt;" title="Approximation of total annotation time.">Time: 0m</span> <input type="button" value="⚙️" id="button_settings" style="height: 1.5em; width: 30px; padding: 0;"><br><br><div id="progress" style="text-align: center;"></div><br><br><input type="button" value="Next 🛠️" id="button_next" class="button-disabled" style="width: 170px; height: 2.5em;"> <input type="button" value="Skip ⏭️" id="button_skip" style="width: 170px; font-size: 11pt; height: 30px; margin-top: 10px; display: none;"></div></div><div id="settings_div" class="white-box" style="margin-right: 20px; margin-top: 10px; display: none; background-color: #e7e2cf; font-size: 11pt;"><input type="checkbox" id="settings_approximate_alignment"> <label for="settings_approximate_alignment">Show approximate alignment</label><br><input type="checkbox" id="settings_word_level"> <label for="settings_word_level">Word-level selection</label><br><br><textarea id="settings_comment" style="width: 95%; height: 80px; resize: vertical; margin-top: 5px; padding: 5px; border-radius: 4px; border: 1px solid #999;" placeholder="Optional: Add any comments or feedback about this item. Will be submitted with Next."></textarea></div><div id="output_div" style="margin-top: 100px;"></div><br><br><br></div></div><footer style="text-align: right; padding: 10px; font-size: 10pt; color: #666;">Running <a href="https://github.com/zouharvi/pearmut" style="color: #666;">Pearmut</a> 1.1.5</footer></body></html>
